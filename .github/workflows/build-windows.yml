name: Build Fingerprint Chromium Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 480

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip3 install httplib2 PySocks six colorama

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl lsb-release \
            pkg-config build-essential \
            libglib2.0-dev \
            python3-pip \
            python3-setuptools \
            xz-utils \
            patch \
            ninja-build

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: Set environment
        run: |
          echo "DEPOT_TOOLS_UPDATE=0" >> $GITHUB_ENV
          echo "PYTHONDONTWRITEBYTECODE=1" >> $GITHUB_ENV

      - name: Clone Chromium source
        run: python3 utils/clone.py

      - name: Show directory structure
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== chromium/ ==="
          ls -la chromium/
          echo "=== chromium/chromium/ ==="
          ls -la chromium/chromium/ | head -20

      - name: Prune binaries
        run: |
          python3 utils/prune_binaries.py chromium/chromium pruning.list

      - name: Apply patches
        run: |
          python3 utils/patches.py apply chromium/chromium patches

      - name: Substitute domains
        run: |
          python3 utils/domain_substitution.py apply \
            -r domain_regex.list \
            -f domain_substitution.list \
            -c build/domsubcache.tar.gz \
            chromium/chromium

      - name: Install Chromium build dependencies
        run: |
          sudo chromium/chromium/build/install-build-deps.sh \
            --no-syms --no-arm --no-chromeos-fonts --no-nacl

      - name: Setup build configuration
        run: |
          mkdir -p chromium/chromium/out/Default
          cp flags.gn chromium/chromium/out/Default/args.gn
          cd chromium/chromium
          out/Default/gn gen out/Default --fail-on-unused-args

      - name: Build Chromium
        run: |
          cd chromium/chromium
          ninja -C out/Default chrome chromedriver chrome_sandbox

      - name: Package output
        run: |
          cd chromium/chromium
          zip -r ../../fingerprint-chromium-linux-x64.zip \
            out/Default/chrome \
            out/Default/chrome_sandbox \
            out/Default/chromedriver \
            out/Default/chrome_crashpad_handler \
            out/Default/*.so \
            out/Default/*.pak \
            out/Default/icudtl.dat \
            out/Default/v8_context_snapshot.bin \
            out/Default/locales \
            out/Default/resources

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-chromium-linux-x64
          path: fingerprint-chromium-linux-x64.zip
          retention-days: 7
