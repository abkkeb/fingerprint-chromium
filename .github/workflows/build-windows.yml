name: Build Fingerprint Chromium Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 480

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl lsb-release \
            pkg-config build-essential \
            libglib2.0-dev \
            python3-pip \
            python3-httplib2 \
            python3-setuptools \
            xz-utils

      - name: Install Python dependencies
        run: |
          pip3 install httplib2 PySocks six colorama

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: Set environment
        run: |
          echo "DEPOT_TOOLS_UPDATE=0" >> $GITHUB_ENV
          echo "PYTHONDONTWRITEBYTECODE=1" >> $GITHUB_ENV

      - name: Install depot_tools Python dependencies
        run: |
          pip3 install httplib2 PySocks six colorama

      - name: Clone Chromium source
        run: python3 utils/clone.py

      - name: Find chromium src directory
        run: |
          echo "=== Directory structure ==="
          ls -la
          ls -la chromium/ || true
          ls -la chromium/chromium/ || true
          find . -name "install-build-deps.sh" 2>/dev/null | head -5

      - name: Install Chromium build dependencies
        run: |
          SRC=$(find . -name "install-build-deps.sh" | head -1 | xargs dirname)
          echo "Found src at: $SRC"
          sudo $SRC/install-build-deps.sh --no-syms --no-arm --no-chromeos-fonts --no-nacl

      - name: Apply patches
        run: python3 utils/patches.py apply

      - name: Build
        run: python3 utils/build.py

      - name: Find and package output
        run: |
          find . -name "chrome" -type f 2>/dev/null | head -5
          OUT=$(find . -path "*/out/Default/chrome" -type f | head -1 | xargs dirname)
          echo "Output dir: $OUT"
          zip -r fingerprint-chromium-linux-x64.zip \
            $OUT/chrome \
            $OUT/chrome_sandbox \
            $OUT/chrome_crashpad_handler \
            $OUT/*.so \
            $OUT/*.pak \
            $OUT/icudtl.dat \
            $OUT/v8_context_snapshot.bin \
            $OUT/locales \
            $OUT/resources || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-chromium-linux-x64
          path: fingerprint-chromium-linux-x64.zip
          retention-days: 7
