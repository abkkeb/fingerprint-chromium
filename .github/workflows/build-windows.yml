name: Build Fingerprint Chromium Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 480

    steps:
      - name: Checkout fingerprint-chromium
        uses: actions/checkout@v4
        with:
          path: fingerprint-chromium

      - name: Clone ungoogled-chromium-windows
        run: |
          git clone --recurse-submodules `
            https://github.com/ungoogled-software/ungoogled-chromium-windows.git
          cd ungoogled-chromium-windows
          git checkout --recurse-submodules 142.0.7444.175-1

      - name: Copy fingerprint patches
        run: |
          xcopy /E /I /Y `
            fingerprint-chromium\patches `
            ungoogled-chromium-windows\ungoogled-chromium\patches

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build
        run: |
          cd ungoogled-chromium-windows
          python3 build.py

      - name: Package
        run: |
          cd ungoogled-chromium-windows
          python3 package.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-chromium-windows-x64
          path: ungoogled-chromium-windows/build/*.zip
          retention-days: 7
